name: Rust

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

env:
    CARGO_TERM_COLOR: always
    DEBIAN_FRONTEND: noninteractive

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: Swatinem/rust-cache@v2.7.7

            - name: Test
              run: |+
                  cargo test --all
