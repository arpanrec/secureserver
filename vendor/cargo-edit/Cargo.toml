# THIS FILE IS AUTOMATICALLY GENERATED BY CARGO
#
# When uploading crates to the registry Cargo will automatically
# "normalize" Cargo.toml files for maximal compatibility
# with all versions of Cargo and also rewrite `path` dependencies
# to registry (e.g., crates.io) dependencies.
#
# If you are reading this file be aware that the original Cargo.toml
# will likely look very different (and much more reasonable).
# See Cargo.toml.orig for the original contents.

[package]
edition = "2021"
name = "cargo-edit"
version = "0.13.1"
authors = [
    "Without Boats <lee@libertad.ucsd.edu>",
    "Pascal Hertleif <killercup@gmail.com>",
    "Sebastian Garrido <sebasgarcep@gmail.com>",
    "Jonas Platte <mail@jonasplatte.de>",
    "Benjamin Gill <git@bgill.eu>",
    "Andronik Ordian <write@reusable.software>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Cargo commands for modifying a `Cargo.toml` file.."
homepage = "https://github.com/killercup/cargo-edit"
documentation = "https://github.com/killercup/cargo-edit/blob/master/README.md#available-subcommands"
readme = "README.md"
keywords = [
    "cargo",
    "cargo-subcommand",
    "cli",
    "dependencies",
    "crates",
]
categories = [
    "development-tools",
    "development-tools::cargo-plugins",
]
license = "Apache-2.0 OR MIT"
repository = "https://github.com/killercup/cargo-edit"

[[package.metadata.release.pre-release-replacements]]
file = "CHANGELOG.md"
min = 1
replace = "{{version}}"
search = "Unreleased"

[[package.metadata.release.pre-release-replacements]]
file = "CHANGELOG.md"
min = 1
replace = "{{date}}"
search = "ReleaseDate"

[[package.metadata.release.pre-release-replacements]]
exactly = 1
file = "CHANGELOG.md"
replace = """
<!-- next-header -->
## Unreleased - ReleaseDate
"""
search = "<!-- next-header -->"

[features]
add = ["cli"]
cli = [
    "color",
    "clap",
]
color = ["concolor-control/auto"]
default = [
    "add",
    "rm",
    "upgrade",
    "set-version",
]
rm = ["cli"]
set-version = ["cli"]
test-external-apis = []
upgrade = ["cli"]

[lib]
name = "cargo_edit"
path = "src/lib.rs"

[[bin]]
name = "cargo-add"
path = "src/bin/add/main.rs"
required-features = ["add"]

[[bin]]
name = "cargo-rm"
path = "src/bin/rm/main.rs"
required-features = ["rm"]

[[bin]]
name = "cargo-set-version"
path = "src/bin/set-version/main.rs"
required-features = ["set-version"]

[[bin]]
name = "cargo-upgrade"
path = "src/bin/upgrade/main.rs"
required-features = ["upgrade"]

[[test]]
name = "cargo-set-version"
path = "tests/cargo-set-version/main.rs"

[[test]]
name = "cargo-upgrade"
path = "tests/cargo-upgrade/main.rs"

[[test]]
name = "readme"
path = "tests/readme.rs"

[dependencies.anyhow]
version = "1.0"

[dependencies.cargo_metadata]
version = "0.19.1"

[dependencies.clap]
version = "4.5.27"
features = [
    "derive",
    "wrap_help",
]
optional = true

[dependencies.clap-cargo]
version = "0.15.2"

[dependencies.concolor-control]
version = "0.0.7"
default-features = false

[dependencies.dunce]
version = "1.0"

[dependencies.hex]
version = "0.4.3"

[dependencies.home]
version = "0.5.11"

[dependencies.indexmap]
version = "2"

[dependencies.pathdiff]
version = "0.2"

[dependencies.semver]
version = "1.0.25"
features = ["serde"]

[dependencies.serde]
version = "1.0.217"

[dependencies.serde_derive]
version = "1.0.217"

[dependencies.tame-index]
version = "0.17"
features = [
    "sparse",
    "native-certs",
    "local",
]

[dependencies.termcolor]
version = "1.4.1"

[dependencies.toml]
version = "0.8.19"

[dependencies.toml_edit]
version = "0.22.22"

[dependencies.url]
version = "2.5.4"

[dev-dependencies.cargo-test-macro]
version = "0.3"

[dev-dependencies.cargo-test-support]
version = "0.6"

[dev-dependencies.snapbox]
version = "0.6.21"
features = [
    "cmd",
    "path",
]

[dev-dependencies.trycmd]
version = "0.15.8"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
